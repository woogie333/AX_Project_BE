version: '3.8'

services:
  app:
    build: .
    ports: ["8080:8080"]
    environment:
      SPRING_DB_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      SPRING_DB_USERNAME: ${DB_USER}
      SPRING_DB_PASSWORD: ${DB_PASS}
      STOCK_KEY: ${STOCK_KEY}
      STOCK_SECRET: ${STOCK_SECRET}
    depends_on: [db]
  db:
    image: mysql:8.0
    environment:
      DB_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      STOCK_KEY: ${STOCK_KEY}
      STOCK_SECRET: ${STOCK_SECRET}


volumes:
  db_data:
version: '3.8'

services:
  app:
    build: .
    ports: ["8080:8080"]
    environment:
      DB_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
      STOCK_KEY: ${STOCK_KEY}
      STOCK_SECRET: ${STOCK_SECRET}
    depends_on:
    - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: